<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buildout CSM Scouting Report & Compliance Dashboard</title>
  <style>
    :root {
      --bg: #f7f6f3; --surface: #ffffff; --surface-2: #f0efe9;
      --border: #e4e2d9; --text: #1a1916; --text-2: #6b6860; --text-3: #9b9890;
      --green: #1a7a56; --green-bg: #e8f5ef;
      --amber: #8c5a0e; --amber-bg: #fdf3e0;
      --red: #8b2020; --red-bg: #fceaea;
      --accent: #2a5ce6; --accent-bg: #eef2fd;
      --teal: #0f6e56; --teal-bg: #e1f5ee;
      --radius: 8px; --radius-sm: 5px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; padding: 24px; }

    .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
    .header p { font-size: 13px; color: var(--text-2); margin-top: 3px; }
    .live-badge { font-size: 11px; font-weight: 500; background: var(--green-bg); border: 1px solid #a8d5c0; color: var(--green); padding: 5px 10px; border-radius: 20px; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

    .ctrl-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 4px; }
    .ctrl-row { display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap; }
    .fld { display: flex; flex-direction: column; gap: 5px; }
    .fld-lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-3); }
    .search-wrap { position: relative; flex: 1; min-width: 220px; }
    .s-input { width: 100%; padding: 8px 12px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); outline: none; font-family: inherit; }
    .s-input:focus { border-color: var(--accent); }
    .s-dd { position: absolute; top: calc(100% + 3px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: 0 4px 14px rgba(0,0,0,.09); z-index: 99; max-height: 300px; overflow-y: auto; }
    .dd-item { padding: 9px 12px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); }
    .dd-item:last-child { border-bottom: none; }
    .dd-item:hover { background: var(--surface-2); }
    .dd-empty { padding: 12px; font-size: 13px; color: var(--text-3); text-align: center; }
    select.tf { padding: 8px 12px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); outline: none; font-family: inherit; cursor: pointer; min-width: 150px; }
    select.tf:focus { border-color: var(--accent); }
    .btn-row { display: flex; gap: 6px; }
    .btn-srch { padding: 8px 14px; font-size: 13px; font-weight: 500; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; }
    .btn-srch:hover:not(:disabled) { background: var(--border); }
    .btn-browse { padding: 8px 14px; font-size: 13px; font-weight: 500; background: var(--surface-2); color: var(--accent); border: 1px solid var(--accent); border-radius: var(--radius-sm); cursor: pointer; }
    .btn-browse:hover:not(:disabled) { background: var(--accent-bg); }
    .btn-analyze { padding: 8px 18px; font-size: 13px; font-weight: 500; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); cursor: pointer; }
    .btn-analyze:hover:not(:disabled) { opacity: .88; }
    .btn-srch:disabled,.btn-browse:disabled,.btn-analyze:disabled { opacity: .4; cursor: not-allowed; }
    .chip { display: inline-flex; align-items: center; gap: 6px; margin-top: 9px; padding: 4px 8px 4px 12px; background: var(--green-bg); border: 1px solid #a8d5c0; border-radius: 20px; font-size: 12px; color: var(--green); font-weight: 500; }
    .chip-x { cursor: pointer; opacity: .6; font-size: 15px; line-height: 1; }
    .chip-x:hover { opacity: 1; }

    .browse-panel { background: var(--surface); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); margin-bottom: 16px; }
    .browse-hdr { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .browse-filter { flex: 1; padding: 7px 11px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); outline: none; font-family: inherit; }
    .browse-filter:focus { border-color: var(--accent); }
    .browse-count { font-size: 12px; color: var(--text-3); white-space: nowrap; }
    .btn-close-browse { padding: 5px 10px; font-size: 12px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; color: var(--text-2); }
    .btn-close-browse:hover { background: var(--surface-2); }
    .browse-list { max-height: 340px; overflow-y: auto; }
    .browse-item { display: flex; align-items: center; padding: 10px 16px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); }
    .browse-item:last-child { border-bottom: none; }
    .browse-item:hover { background: var(--surface-2); }
    .browse-item-name { flex: 1; font-weight: 500; }
    .browse-item-arrow { color: var(--text-3); font-size: 16px; }
    .browse-loading,.browse-empty { padding: 24px; text-align: center; font-size: 13px; color: var(--text-3); }

    .prog-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; }
    .prog-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-2); }
    .prog-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: blink 1s infinite; flex-shrink: 0; }

    /* Results — 3-column layout: score | next step | analysis */
    .res-grid { display: grid; grid-template-columns: 220px 280px 1fr; gap: 14px; margin-bottom: 18px; }

    .score-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; display: flex; flex-direction: column; gap: 14px; }
    .score-big { font-size: 48px; font-weight: 700; letter-spacing: -2px; line-height: 1; }
    .s-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-3); margin-bottom: 3px; font-weight: 600; }
    .s-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: .04em; }
    .sg { background: var(--green-bg); color: var(--green); }
    .sw { background: var(--amber-bg); color: var(--amber); }
    .sb { background: var(--red-bg); color: var(--red); }
    .sn { background: var(--surface-2); color: var(--text-3); }
    .btrk { height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
    .bfil { height: 6px; border-radius: 3px; }
    .meta { display: flex; flex-direction: column; gap: 7px; }
    .mi { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .mk { color: var(--text-3); } .mv { font-weight: 500; font-family: monospace; }
    .btn-save { padding: 7px 14px; font-size: 12px; font-weight: 500; background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: var(--radius-sm); cursor: pointer; }
    .btn-save:hover { background: var(--accent); color: #fff; }
    .btn-saved { padding: 7px 14px; font-size: 12px; font-weight: 500; background: var(--green-bg); color: var(--green); border: 1px solid #a8d5c0; border-radius: var(--radius-sm); cursor: default; }

    /* Planhat health badge (0-10 snapshot at query time) */
    .hb { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; font-family: monospace; white-space: nowrap; }
    .hb-g { background: var(--green-bg); color: var(--green); }
    .hb-a { background: var(--amber-bg); color: var(--amber); }
    .hb-r { background: var(--red-bg); color: var(--red); }
    .hb-n { background: var(--surface-2); color: var(--text-3); }

    /* Next step card */
    .nextstep-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; display: flex; flex-direction: column; gap: 12px; }
    .ns-header { display: flex; align-items: center; justify-content: space-between; }
    .ns-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-3); }
    .ns-priority { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: .05em; }
    .ns-high { background: var(--red-bg); color: var(--red); }
    .ns-medium { background: var(--amber-bg); color: var(--amber); }
    .ns-low { background: var(--teal-bg); color: var(--teal); }
    .ns-body { font-size: 13px; line-height: 1.7; color: var(--text); flex: 1; }
    .ns-framework { font-size: 11px; color: var(--text-3); border-top: 1px solid var(--border); padding-top: 10px; display: flex; align-items: center; gap: 5px; }
    .ns-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    .a-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; overflow-y: auto; max-height: 400px; }
    .a-co { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .gap-lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-3); margin-bottom: 4px; }
    .gap-txt { font-size: 13px; padding: 8px 12px; background: var(--amber-bg); border-left: 3px solid #d4830a; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; color: #5c3a08; margin-bottom: 14px; }
    .a-body p { font-size: 13px; line-height: 1.7; color: var(--text-2); margin-bottom: 10px; }
    .a-body p:last-child { margin-bottom: 0; }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; }
    .ph { padding: 11px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .pt { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text-2); }
    .rt { width: 100%; border-collapse: collapse; }
    .rt th { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text-3); text-align: left; padding: 9px 14px; background: var(--bg); border-bottom: 1px solid var(--border); }
    .rt td { padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 13px; }
    .rt tr:last-child td { border-bottom: none; }
    .rt tbody tr { cursor: pointer; }
    .rt tbody tr:hover td { background: var(--bg); }
    .tbar { width: 46px; height: 5px; background: var(--surface-2); border-radius: 3px; display: inline-block; vertical-align: middle; margin-right: 7px; overflow: hidden; }
    .tfil { height: 5px; border-radius: 3px; display: block; }

    /* Team activity panel */
    .act-tabs { display: flex; gap: 4px; }
    .act-tab { padding: 5px 11px; font-size: 12px; font-weight: 500; background: transparent; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; color: var(--text-2); }
    .act-tab:hover { background: var(--surface-2); }
    .act-tab.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
    .act-empty { padding: 22px; text-align: center; font-size: 13px; color: var(--text-3); }
    .act-note { padding: 14px 16px; font-size: 12px; color: var(--text-3); line-height: 1.6; }
    .act-note code { font-family: monospace; background: var(--surface-2); padding: 1px 5px; border-radius: 3px; }
    .act-time { color: var(--text-3); font-size: 12px; font-family: monospace; }

    .err-box { background: var(--red-bg); border: 1px solid #e8aaaa; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: var(--red); margin-bottom: 14px; }
    .empty { text-align: center; padding: 44px 20px; color: var(--text-3); }
    .empty p { font-size: 14px; font-weight: 500; color: var(--text-2); margin-bottom: 4px; }
    .empty span { font-size: 13px; }

    @media (max-width: 900px) { .res-grid { grid-template-columns: 1fr 1fr; } .a-card { grid-column: 1 / -1; } }
    @media (max-width: 640px) { .res-grid { grid-template-columns: 1fr; } .ctrl-row { flex-direction: column; } }
  </style>
</head>
<body>
<div id="app"></div>
<script>
  const WORKER_URL = 'https://buildout-compliance-worker.dan-wallace.workers.dev';

  const S = {
    query: '', results: [], showDD: false, searching: false,
    company: null, days: 30,
    browseOpen: false, browseAccounts: [], browseFilter: '', browseLoading: false,
    analyzing: false, step: '',
    analysis: null, saved: [],
    activity: null, activityTab: 'recent',
    error: null
  };

  function sc(s) { return s >= 75 ? '#1a7a56' : s >= 50 ? '#d4830a' : '#c0392b'; }
  function stCls(s) { return s === 'On track' ? 'sg' : s === 'Needs attention' ? 'sw' : 'sb'; }
  function nsCls(p) { return p === 'High' ? 'ns-high' : p === 'Medium' ? 'ns-medium' : 'ns-low'; }
  function tfl(d) { return {7:'Last 7 days',14:'Last 14 days',30:'Last 30 days',60:'Last 60 days',90:'Last 90 days'}[d]||`Last ${d} days`; }

  // Planhat health snapshot (0-10). Colored badge; grey dash when unavailable.
  function healthBadge(h) {
    if (h === null || h === undefined) return `<span class="hb hb-n">—</span>`;
    const cls = h >= 7 ? 'hb-g' : h >= 4 ? 'hb-a' : 'hb-r';
    return `<span class="hb ${cls}">${h}/10</span>`;
  }
  function ago(iso) {
    if (!iso) return '';
    const s = (Date.now() - new Date(iso).getTime()) / 1000;
    if (s < 60) return 'just now';
    const m = s / 60; if (m < 60) return Math.floor(m) + 'm ago';
    const h = m / 60; if (h < 24) return Math.floor(h) + 'h ago';
    return Math.floor(h / 24) + 'd ago';
  }

  async function post(path, body) {
    const res = await fetch(WORKER_URL + path, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  }

  async function doSearch() {
    const inp = document.getElementById('si');
    const q = (inp ? inp.value : '').trim();
    if (!q) return;
    S.searching = true; S.results = []; S.showDD = false; S.error = null; render();
    try { S.results = await post('/search', { query: q }); S.showDD = true; }
    catch (e) { S.error = 'Search failed: ' + e.message; }
    S.searching = false; render();
  }

  function pick(i) { S.company = S.results[i]; S.showDD = false; S.results = []; S.analysis = null; S.error = null; render(); }
  function clearCo() { S.company = null; S.analysis = null; S.error = null; render(); }

  async function openBrowse() {
    S.browseOpen = true; S.browseFilter = '';
    if (!S.browseAccounts.length) {
      S.browseLoading = true; render();
      try { S.browseAccounts = await post('/browse', {}); }
      catch (e) { S.error = 'Browse failed: ' + e.message; }
      S.browseLoading = false;
    }
    render();
  }

  function closeBrowse() { S.browseOpen = false; render(); }

  function pickBrowse(i) {
    const filtered = S.browseAccounts.filter(c => !S.browseFilter || c.name.toLowerCase().includes(S.browseFilter.toLowerCase()));
    S.company = filtered[i]; S.browseOpen = false; S.analysis = null; S.error = null; render();
  }

  function updateBrowseFilter(val) {
    S.browseFilter = val; render();
    const f = document.getElementById('bf');
    if (f) { f.focus(); f.setSelectionRange(f.value.length, f.value.length); }
  }

  async function doAnalyze() {
    if (!S.company) return;
    S.analyzing = true; S.analysis = null; S.error = null;
    S.step = `Fetching conversations for ${S.company.name}…`; render();
    try {
      S.step = 'Scoring and generating next step recommendation…';
      const result = await post('/analyze', { companyId: S.company._id, companyName: S.company.name, days: S.days });
      S.analysis = { company: S.company.name, cid: S.company._id, days: S.days, ...result };
    } catch (e) { S.error = 'Analysis failed: ' + e.message; }
    S.analyzing = false; render();
    loadActivity(); // refresh the team activity panel with this new query
  }

  function saveRpt() {
    if (!S.analysis) return;
    const i = S.saved.findIndex(x => x.cid === S.analysis.cid);
    if (i >= 0) S.saved[i] = S.analysis; else S.saved.push(S.analysis);
    render();
  }
  function viewSaved(i) { S.analysis = S.saved[i]; render(); }

  // ---- team activity --------------------------------------------------------
  async function loadActivity() {
    try { S.activity = await post('/activity', {}); }
    catch (e) { /* non-fatal: panel just won't show */ }
    render();
  }
  function setActTab(k) { S.activityTab = k; render(); }
  function actClick(tab, i) {
    const r = S.activity && S.activity[tab] && S.activity[tab][i];
    if (!r) return;
    S.company = { _id: r.companyId, name: r.companyName };
    if (r.lastDays) S.days = r.lastDays;
    S.analysis = null; S.error = null; render();
    doAnalyze();
  }

  function activityPanel() {
    if (!S.activity) return '';
    if (!S.activity.configured) {
      return `<div class="panel"><div class="ph"><span class="pt">Team Activity</span></div>
        <div class="act-note">Activity tracking is built in but not switched on yet. Create a KV namespace and bind it as <code>ACTIVITY</code> in <code>wrangler.toml</code>, then redeploy — queries will start logging here automatically.</div></div>`;
    }
    const tab = S.activityTab;
    const list = S.activity[tab] || [];
    const tabs = [['recent','Recent'],['mostQueried','Most queried'],['lowestScoring','Lowest scoring']];
    const col4 = { recent: 'Last queried', mostQueried: 'Queries', lowestScoring: 'Status' }[tab];
    const rows = list.map((r, i) => `
      <tr onclick="actClick('${tab}',${i})">
        <td style="font-weight:500">${r.companyName}</td>
        <td><span class="tbar"><span class="tfil" style="width:${r.lastScore||0}%;background:${r.lastScore!==null?sc(r.lastScore):'#ccc'}"></span></span>
          <span style="font-family:monospace;font-weight:500;color:${r.lastScore!==null?sc(r.lastScore):'#9b9890'}">${r.lastScore!==null?r.lastScore+'%':'—'}</span></td>
        <td>${healthBadge(r.planhatHealth)}</td>
        <td>${
          tab === 'recent' ? `<span class="act-time">${ago(r.lastQueried)}</span>`
          : tab === 'mostQueried' ? `<span style="font-family:monospace">${r.count}×</span>`
          : `<span class="s-tag ${r.lastScore!==null?stCls(r.lastStatus):'sn'}" style="font-size:10px;padding:2px 8px">${r.lastStatus||'—'}</span>`
        }</td>
      </tr>`).join('');
    return `<div class="panel">
      <div class="ph">
        <span class="pt">Team Activity${S.activity.total ? ` — ${S.activity.total} account${S.activity.total!==1?'s':''} queried` : ''}</span>
        <div class="act-tabs">${tabs.map(([k,label])=>`<button class="act-tab ${tab===k?'active':''}" onclick="setActTab('${k}')">${label}</button>`).join('')}</div>
      </div>
      ${!list.length
        ? `<div class="act-empty">No accounts queried yet — run an analysis and it'll show up here.</div>`
        : `<table class="rt"><thead><tr><th>Account</th><th>Compliance</th><th>Planhat Health</th><th>${col4}</th></tr></thead><tbody>${rows}</tbody></table>`}
    </div>`;
  }

  function render() {
    const curQ = document.getElementById('si')?.value || '';
    const a = S.analysis;
    const isSaved = a && S.saved.some(x => x.cid === a.cid);
    const filteredBrowse = S.browseAccounts.filter(c => !S.browseFilter || c.name.toLowerCase().includes(S.browseFilter.toLowerCase()));
    const hasActivity = S.activity && S.activity.configured && S.activity.total > 0;

    document.getElementById('app').innerHTML = `
<div class="header">
  <div><h1>CS Communication Compliance</h1><p>Buildout customer standards · Live from Planhat</p></div>
  <div class="live-badge"><div class="live-dot"></div>Planhat live</div>
</div>

${S.error ? `<div class="err-box">${S.error}</div>` : ''}

<div class="ctrl-panel">
  <div class="ctrl-row">
    <div class="fld" style="flex:1;min-width:220px">
      <span class="fld-lbl">Account</span>
      <div class="search-wrap">
        <input id="si" class="s-input" placeholder="Search account name…"
          ${S.company ? 'style="display:none"' : ''}
          onkeydown="if(event.key==='Enter')doSearch()" />
        ${S.showDD && S.results.length ? `<div class="s-dd">${S.results.map((r,i)=>`<div class="dd-item" onclick="pick(${i})">${r.name}</div>`).join('')}</div>` : ''}
        ${S.showDD && !S.results.length && !S.searching ? `<div class="s-dd"><div class="dd-empty">No accounts found</div></div>` : ''}
      </div>
      ${S.company ? `<div class="chip">${S.company.name}<span class="chip-x" onclick="clearCo()">×</span></div>` : ''}
    </div>
    <div class="fld">
      <span class="fld-lbl">Timeframe</span>
      <select class="tf" onchange="S.days=parseInt(this.value)" ${S.analyzing?'disabled':''}>
        ${[7,14,30,60,90].map(d=>`<option value="${d}"${S.days===d?' selected':''}>${tfl(d)}</option>`).join('')}
      </select>
    </div>
    <div class="fld">
      <span class="fld-lbl">&nbsp;</span>
      <div class="btn-row">
        ${!S.company ? `
          <button class="btn-srch" onclick="doSearch()" ${S.searching?'disabled':''}>${S.searching?'Searching…':'Search'}</button>
          <button class="btn-browse" onclick="openBrowse()" ${S.browseLoading?'disabled':''}>Browse all</button>
        ` : `
          <button class="btn-analyze" onclick="doAnalyze()" ${S.analyzing?'disabled':''}>${S.analyzing?'Analyzing…':'Analyze'}</button>
        `}
      </div>
    </div>
  </div>
</div>

${S.browseOpen ? `
<div class="browse-panel">
  <div class="browse-hdr">
    <input id="bf" class="browse-filter" placeholder="Filter ${S.browseAccounts.length} accounts…" value="${S.browseFilter}" oninput="updateBrowseFilter(this.value)" />
    <span class="browse-count">${filteredBrowse.length} account${filteredBrowse.length!==1?'s':''}</span>
    <button class="btn-close-browse" onclick="closeBrowse()">Close</button>
  </div>
  <div class="browse-list">
    ${S.browseLoading ? `<div class="browse-loading">Loading accounts…</div>` :
      !filteredBrowse.length ? `<div class="browse-empty">No accounts match "${S.browseFilter}"</div>` :
      filteredBrowse.map((c,i)=>`<div class="browse-item" onclick="pickBrowse(${i})"><span class="browse-item-name">${c.name}</span><span class="browse-item-arrow">›</span></div>`).join('')}
  </div>
</div>` : '<div style="margin-bottom:16px"></div>'}

${S.analyzing ? `<div class="prog-panel"><div class="prog-row"><div class="prog-dot"></div>${S.step}</div></div>` : ''}

${a && !S.analyzing ? `
<div class="res-grid">

  <div class="score-card">
    <div>
      <div class="s-lbl">Compliance Score</div>
      <div class="score-big" style="color:${a.score!==null?sc(a.score):'#9b9890'}">${a.score!==null?a.score+'%':'—'}</div>
    </div>
    <div class="btrk"><div class="bfil" style="width:${a.score||0}%;background:${a.score!==null?sc(a.score):'#ccc'}"></div></div>
    <div><span class="s-tag ${a.score!==null?stCls(a.status):'sn'}">${a.status}</span></div>
    <div class="meta">
      <div class="mi"><span class="mk">Planhat health</span><span class="mv">${healthBadge(a.planhatHealth)}</span></div>
      <div class="mi"><span class="mk">Comms reviewed</span><span class="mv">${a.commsCount}</span></div>
      <div class="mi"><span class="mk">Timeframe</span><span class="mv">${tfl(a.days)}</span></div>
    </div>
    ${isSaved?`<button class="btn-saved">Saved to report ✓</button>`:`<button class="btn-save" onclick="saveRpt()">Save to report</button>`}
  </div>

  <div class="nextstep-card">
    <div class="ns-header">
      <span class="ns-title">Suggested Next Step</span>
      ${a.nextStepPriority ? `<span class="ns-priority ${nsCls(a.nextStepPriority)}">${a.nextStepPriority}</span>` : ''}
    </div>
    <div class="ns-body">${a.nextStep || 'No specific next step identified.'}</div>
    <div class="ns-framework">
      <div class="ns-dot"></div>
      Based on Buildout CS standards &amp; Gainsight CS lifecycle framework
    </div>
  </div>

  <div class="a-card">
    <div class="a-co">${a.company}</div>
    ${a.topGap && a.status!=='No data' ? `<div class="gap-lbl">Top Gap</div><div class="gap-txt">${a.topGap}</div>` : ''}
    <div class="a-body">${a.analysis.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div>
  </div>

</div>` : ''}

${S.saved.length ? `
<div class="panel">
  <div class="ph"><span class="pt">Report — ${S.saved.length} account${S.saved.length!==1?'s':''}</span></div>
  <table class="rt">
    <thead><tr><th>Account</th><th>Score</th><th>Health</th><th>Comms</th><th>Status</th><th>Next Step</th><th>Priority</th></tr></thead>
    <tbody>
      ${[...S.saved].sort((a,b)=>(a.score||0)-(b.score||0)).map(r=>`
        <tr onclick="viewSaved(${S.saved.indexOf(r)})">
          <td style="font-weight:500">${r.company}</td>
          <td><span class="tbar"><span class="tfil" style="width:${r.score||0}%;background:${r.score!==null?sc(r.score):'#ccc'}"></span></span>
            <span style="font-family:monospace;font-weight:500;color:${r.score!==null?sc(r.score):'#9b9890'}">${r.score!==null?r.score+'%':'—'}</span></td>
          <td>${healthBadge(r.planhatHealth)}</td>
          <td style="color:#9b9890;font-family:monospace;font-size:12px">${r.commsCount}</td>
          <td><span class="s-tag ${r.score!==null?stCls(r.status):'sn'}" style="font-size:10px;padding:2px 8px">${r.status}</span></td>
          <td style="color:#6b6860;font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.nextStep||''}">${r.nextStep||'—'}</td>
          <td>${r.nextStepPriority?`<span class="ns-priority ${nsCls(r.nextStepPriority)}">${r.nextStepPriority}</span>`:''}</td>
        </tr>`).join('')}
    </tbody>
  </table>
</div>` : ''}

${activityPanel()}

${!S.analyzing && !a && !S.error && !hasActivity ? `
<div class="empty">
  <p>Search or browse for an account to begin</p>
  <span>Use Search for a specific name, or Browse all to scroll every account</span>
</div>` : ''}`;

    const si = document.getElementById('si');
    if (si && !S.company) si.value = curQ;
  }

  render();
  loadActivity();
</script>
</body>
</html>
